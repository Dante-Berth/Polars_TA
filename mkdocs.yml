site_name: Polars TA
site_description: Technical analysis indicators built on Polars expressions instead of pandas
site_url: https://dante-berth.github.io/Polars_TA/
repo_name: Dante-Berth/Polars_TA
repo_url: https://github.com/Dante-Berth/Polars_TA

nav:
  - Home: index.md
  - Getting started: getting_started.md
  - Concepts: concepts.md
  - How-to guides: how_to_guides.md
  - Examples: examples.md
  - API reference:
      - api/index.md
      - Momentum: api/momentum.md
      - Trend: api/trend.md
      - Volatility: api/volatility.md
      - Volume: api/volume.md
      - Returns: api/returns.md
      - Quant: api/quant.md
      - Microstructure: api/microstructure.md
      - Calendar / seasonality: api/calendar.md
      - Expression namespace: api/namespace.md
      - Utilities: api/utils.md
  - Changelog: changelog.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: "."
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            heading_level: 2
            members_order: source
            merge_init_into_class: true

extra_css:
  - stylesheets/extra.css

validation:
  links:
    absolute_links: relative_to_docs
    unrecognized_links: warn
